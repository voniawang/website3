        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        * { border-radius: 0 !important; }

        body {
            background: radial-gradient(circle at 80% 20%, #14256E 0%, #050505 100%);
            color: var(--white);
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            cursor: crosshair;
        }

        .font-display {
            font-family: 'HYQiHei-60S', 'HYQiHei', '汉仪旗黑', 'Inter', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.06em;
        }

        .font-mono {
            font-family: 'Roboto Mono', monospace;
            font-weight: 500;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--orange-pulse); }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.7); }
        }
        .live-dot { animation: pulse-dot 1.2s ease-in-out infinite; }

        @keyframes watermark-drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .nav-item { cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { color: var(--orange-pulse); }
        .nav-item.active { color: var(--orange-pulse); }

        .btn-skew { transition: all 0.2s; cursor: pointer; }
        .btn-skew:hover { transform: skewX(-10deg); background: #FF4D00 !important; color: var(--black) !important; }

        .match-row { transition: all 0.2s; cursor: pointer; }
        .match-row:hover { background: linear-gradient(90deg, rgba(53,82,246,0.15) 0%, transparent 100%); }

        .section-title {
            color: var(--orange-pulse);
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            position: relative;
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--orange-pulse) 0%, transparent 100%);

            margin-bottom: 0;

            height: 1px;

        // ==========================================

        // ==========================================
        const MobileTabBar = ({ activeTab, onTabChange }) => {
